<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-camera position="0 2 4" look-controls wasd-controls="acceleration: 50"></a-camera>
      <a-box position="-1 1.5 -3" width="5" height="1.7" rotation="0 0 0" color="#4CC3D9" wasd-controls="acceleration: 50" id="Carro">
        <a-circle src="car-tyre.png" side="double" transparent="true" position="-1.6 -0.5 1" radius="0.8" color="#000000"></a-circle>
        <a-circle src="car-tyre.png" side="double" transparent="true" position="1.6 -0.5 1" radius="0.8" color="#000000"></a-circle>
        <a-circle src="car-tyre.png" side="double" transparent="true" position="-1.6 -0.5 -0.8" radius="0.8" color="#518486"></a-circle>
        <a-circle src="car-tyre.png" side="double" transparent="true" position="1.6 -0.5 -0.8" radius="0.8" color="#518486"></a-circle>
      </a-box>
      <a-sphere position="-3 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
      <a-sphere position="35 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
      <a-cylinder position="6 0.75 1" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      <a-cylinder position="1 0.75 1" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      <a-cylinder position="15 0.75 1" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      <a-cylinder position="25 0.75 1" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      <a-cylinder position="65 0.75 1" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="500" height="4" color="#7BC8A4"></a-plane>
      <a-sky color="#ECECEC"></a-sky>
    </a-scene>
  </body>
</html>
